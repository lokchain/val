<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Claim Your $23 💸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Satisfy&family=Poppins:wght@500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #ffe4f0 0%, #ffc6de 50%, #ffb3d1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .heart-float {
      position: fixed;
      animation: floatUp linear infinite;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh); opacity: 0.5; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: white;
      border-radius: 36px;
      padding: 44px 36px 40px;
      width: 88vw;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(255, 80, 140, 0.2), 0 4px 16px rgba(0,0,0,0.07);
      animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { transform: scale(0.7) translateY(60px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .mascot {
      font-size: 5rem;
      display: block;
      margin-bottom: 6px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-12px) rotate(2deg); }
    }

    .money-tag {
      display: inline-block;
      background: linear-gradient(135deg, #ffe066, #ffb300);
      color: #7a4f00;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 8px 22px;
      border-radius: 50px;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(255,179,0,0.35);
      animation: fadeSlide 0.5s ease 0.2s both;
      opacity: 0;
    }

    .question-top {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: #2d1b2e;
      margin-bottom: 8px;
      line-height: 1.6;
      animation: fadeSlide 0.5s ease 0.35s both;
      opacity: 0;
    }

    .question-top span {
      color: #e8326a;
      font-weight: 700;
    }

    .question-main {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.85rem;
      color: #e8326a;
      line-height: 1.3;
      margin-bottom: 6px;
      animation: fadeSlide 0.5s ease 0.52s both;
      opacity: 0;
    }

    .question-sub {
      display: block;
      font-size: 0.7rem;
      color: #ccc;
      font-style: italic;
      margin-bottom: 30px;
      animation: fadeSlide 0.5s ease 0.6s both;
      opacity: 0;
    }

    @keyframes fadeSlide {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .yes-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
      animation: fadeSlide 0.5s ease 0.72s both;
      opacity: 0;
    }
    .yes-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50px;
      background: rgba(232, 50, 106, 0.15);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.08); opacity: 0.1; }
    }

    .btn-yes {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #ff4d8d, #e8326a);
      color: white;
      border: none;
      padding: 16px 56px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(232, 50, 106, 0.45);
    }

    .hint {
      font-size: 0.76rem;
      color: #ddd;
      font-style: italic;
      animation: fadeSlide 0.5s ease 0.85s both;
      opacity: 0;
    }

    /* NO BUTTON — fixed to viewport so it always shows on mobile */
    .btn-no {
      position: fixed;
      background: linear-gradient(135deg, #d0d0d0, #b0b0b0);
      color: white;
      border: none;
      padding: 16px 44px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      z-index: 9999;
    }

    /* Celebration */
    .celebration {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .celebration.show {
      display: flex;
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .celebration img {
      width: 210px;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(232, 50, 106, 0.2);
    }
    .thanku-text {
      font-family: 'Satisfy', cursive;
      font-size: 2.1rem;
      color: #e8326a;
      margin-top: 22px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
      opacity: 0;
    }
    .sub-text {
      font-size: 0.95rem;
      color: #999;
      margin-top: 10px;
      line-height: 1.6;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.45s both;
      opacity: 0;
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .confetti-piece {
      position: fixed;
      top: -12px;
      border-radius: 3px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 9998;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(800deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- No button fixed to screen — always visible on mobile -->
  <button class="btn-no" id="noBtn">No 🙅</button>

  <div class="card" id="mainCard">
    <div id="questionSection">
      <span class="mascot">🐱</span>

      <p class="question-top">
        Prachi, before I send you your <span>$23</span><br/>you have to answer —
      </p>

      <div class="money-tag">💌 Will you be my Valentine? 💌</div>

      <span class="question-sub">⁽ if not now, even in near future ⁾</span>

      <div class="yes-wrap">
        <button class="btn-yes" onclick="onYes()">Yes 💖</button>
      </div>

      <p class="hint">"No" seems a bit shy 🐾</p>
    </div>

    <div class="celebration" id="celebration">
      <img
        src="https://media.giphy.com/media/g9582DNuQppxC/giphy.gif"
        alt="yay"
        onerror="this.src='https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif'"
      />
      <p class="thanku-text">Shukriya Tiwari Ji! 🎉</p>
      <p class="sub-text">I'm meeting you soon<br/>with $23 and your YES 💸🌸</p>
    </div>
  </div>

<script>
  // Floating hearts
  const emojis = ['💖','💕','✨','🌸','💗','🌷','💝','🎀','⭐'];
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1 + Math.random() * 1.3) + 'rem';
    h.style.animationDuration = (7 + Math.random() * 9) + 's';
    h.style.animationDelay = '-' + (Math.random() * 12) + 's';
    document.body.appendChild(h);
  }

  // No button — fixed to viewport, runs away
  const noBtn = document.getElementById('noBtn');

  function initNoBtn() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Place beside/below Yes button area visually
    noBtn.style.left = Math.round(vw * 0.52) + 'px';
    noBtn.style.top  = Math.round(vh * 0.70) + 'px';
  }

  function escapeFrom(cx, cy) {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const bw = noBtn.offsetWidth;
    const bh = noBtn.offsetHeight;
    const rect = noBtn.getBoundingClientRect();

    const btnCx = rect.left + bw / 2;
    const btnCy = rect.top  + bh / 2;

    let dx = btnCx - cx;
    let dy = btnCy - cy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = Math.max(110, 220 - dist);

    dx = (dx / dist) * force;
    dy = (dy / dist) * force;

    const pad = 10;
    let newLeft = Math.max(pad, Math.min(vw - bw - pad, rect.left + dx));
    let newTop  = Math.max(pad, Math.min(vh - bh - pad, rect.top  + dy));

    noBtn.style.left = newLeft + 'px';
    noBtn.style.top  = newTop  + 'px';
  }

  // Desktop
  document.addEventListener('mousemove', (e) => {
    const r = noBtn.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2);
    const dy = e.clientY - (r.top  + r.height / 2);
    if (Math.sqrt(dx*dx + dy*dy) < 90) escapeFrom(e.clientX, e.clientY);
  });
  noBtn.addEventListener('mouseover', (e) => escapeFrom(e.clientX, e.clientY));

  // Mobile
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    escapeFrom(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const r = noBtn.getBoundingClientRect();
    const dx = t.clientX - (r.left + r.width / 2);
    const dy = t.clientY - (r.top  + r.height / 2);
    if (Math.sqrt(dx*dx + dy*dy) < 100) escapeFrom(t.clientX, t.clientY);
  }, { passive: true });

  noBtn.addEventListener('click', (e) => escapeFrom(e.clientX, e.clientY));

  window.addEventListener('load', initNoBtn);
  window.addEventListener('resize', initNoBtn);

  // Yes
  function onYes() {
    document.getElementById('questionSection').style.display = 'none';
    noBtn.style.display = 'none';
    document.getElementById('celebration').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#ff4d8d','#ffb3d1','#ffe066','#66d9ff','#a855f7','#34d399'];
    for (let i = 0; i < 100; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.width  = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        c.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 25);
    }
  }
</script>
</body>
</html>
